<rect x="0" y="0" width="680" height="68" fill="#E1F5EE"/>
<text x="340" y="28" class="th" text-anchor="middle" font-size="16" fill="#085041">Understanding learners: context, morality &amp; identity</text>
<text x="340" y="50" class="ts" text-anchor="middle" fill="#0F6E56">EDST 1000U — Week 3 reconceptualized</text>

<rect x="40" y="80" width="600" height="54" rx="12" fill="#3C3489"/>
<text x="340" y="102" class="th" text-anchor="middle" font-size="12" fill="#EEEDFE">A student is never just a student.</text>
<text x="340" y="120" class="ts" text-anchor="middle" fill="#CECBF6">They are shaped by systems, instincts, and an identity still forming.</text>

<line x1="340" y1="134" x2="340" y2="152" stroke="#AFA9EC" stroke-width="1" marker-end="url(#arrow)"/>

<text x="340" y="170" class="th" text-anchor="middle" font-size="12" fill="#3C3489">Three lenses on the same student</text>

<rect x="40" y="182" width="192" height="110" rx="12" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="136" y="202" class="th" text-anchor="middle" font-size="12" fill="#26215C">Bronfenbrenner</text>
<text x="136" y="218" class="ts" text-anchor="middle" fill="#534AB7">The context</text>
<line x1="56" y1="226" x2="216" y2="226" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="136" y="244" class="ts" text-anchor="middle" fill="#26215C">Family, culture, and</text>
<text x="136" y="258" class="ts" text-anchor="middle" fill="#26215C">community shape the</text>
<text x="136" y="272" class="ts" text-anchor="middle" fill="#26215C">learner before they</text>
<text x="136" y="286" class="ts" text-anchor="middle" fill="#534AB7">enter the classroom.</text>

<rect x="244" y="182" width="192" height="110" rx="12" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
<text x="340" y="202" class="th" text-anchor="middle" font-size="12" fill="#4B1528">Haidt + Gilligan</text>
<text x="340" y="218" class="ts" text-anchor="middle" fill="#993556">The moral instincts</text>
<line x1="260" y1="226" x2="420" y2="226" stroke="#ED93B1" stroke-width="0.5"/>
<text x="340" y="244" class="ts" text-anchor="middle" fill="#4B1528">Gut reactions come</text>
<text x="340" y="258" class="ts" text-anchor="middle" fill="#4B1528">before reasoning.</text>
<text x="340" y="272" class="ts" text-anchor="middle" fill="#4B1528">Care and trust drive</text>
<text x="340" y="286" class="ts" text-anchor="middle" fill="#993556">moral decisions.</text>

<rect x="448" y="182" width="192" height="110" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="544" y="202" class="th" text-anchor="middle" font-size="12" fill="#412402">Erikson</text>
<text x="544" y="218" class="ts" text-anchor="middle" fill="#854F0B">The identity</text>
<line x1="464" y1="226" x2="624" y2="226" stroke="#EF9F27" stroke-width="0.5"/>
<text x="544" y="244" class="ts" text-anchor="middle" fill="#412402">Students are still</text>
<text x="544" y="258" class="ts" text-anchor="middle" fill="#412402">figuring out who</text>
<text x="544" y="272" class="ts" text-anchor="middle" fill="#412402">they are relative to</text>
<text x="544" y="286" class="ts" text-anchor="middle" fill="#854F0B">those around them.</text>

<line x1="136" y1="292" x2="136" y2="316" stroke="#AFA9EC" stroke-width="1"/>
<line x1="340" y1="292" x2="340" y2="316" stroke="#ED93B1" stroke-width="1"/>
<line x1="544" y1="292" x2="544" y2="316" stroke="#EF9F27" stroke-width="1"/>
<line x1="136" y1="316" x2="544" y2="316" stroke="#888780" stroke-width="0.5"/>
<line x1="340" y1="316" x2="340" y2="334" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="80" y="336" width="520" height="42" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="354" class="th" text-anchor="middle" font-size="12" fill="#2C2C2A">Together: classroom behavior reflects</text>
<text x="340" y="370" class="ts" text-anchor="middle" fill="#5F5E5A">upbringing, instincts, and an identity in progress.</text>

<line x1="40" y1="394" x2="640" y2="394" stroke="#D3D1C7" stroke-width="0.5"/>

<text x="340" y="414" class="th" text-anchor="middle" font-size="12" fill="#3C3489">Why Kohlberg's stages alone fall short</text>

<rect x="40" y="426" width="290" height="100" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="60" y="448" class="th" font-size="12" fill="#0C447C">Kohlberg assumed:</text>
<text x="60" y="466" class="ts" fill="#042C53">Moral growth = linear stages</text>
<text x="60" y="482" class="ts" fill="#042C53">Reasoning before reaction</text>
<text x="60" y="498" class="ts" fill="#042C53">Universal for all people</text>
<text x="60" y="514" class="ts" fill="#185FA5">Based on male subjects only</text>

<rect x="350" y="426" width="290" height="100" rx="12" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="370" y="448" class="th" font-size="12" fill="#712B13">But research shows:</text>
<text x="370" y="466" class="ts" fill="#4A1B0C">Haidt: intuition fires first</text>
<text x="370" y="482" class="ts" fill="#4A1B0C">Gilligan: care matters too</text>
<text x="370" y="498" class="ts" fill="#4A1B0C">Culture shapes moral views</text>
<text x="370" y="514" class="ts" fill="#993C1D">His model had blind spots</text>

<line x1="330" y1="476" x2="350" y2="476" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<line x1="40" y1="542" x2="640" y2="542" stroke="#D3D1C7" stroke-width="0.5"/>

<text x="340" y="562" class="th" text-anchor="middle" font-size="12" fill="#085041">What this means for teaching</text>
<text x="340" y="578" class="ts" text-anchor="middle" fill="#5F5E5A">These frameworks change what effective teachers do.</text>

<rect x="40" y="592" width="600" height="50" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="60" y="612" class="th" font-size="12" fill="#04342C">Know the whole student (Bronfenbrenner)</text>
<text x="60" y="630" class="ts" fill="#085041">Don't just address struggles in class. Ask what's happening outside it.</text>

<rect x="40" y="650" width="600" height="50" rx="10" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
<text x="60" y="670" class="th" font-size="12" fill="#4B1528">Build the relationship first (Gilligan + Haidt)</text>
<text x="60" y="688" class="ts" fill="#4B1528">The teacher-student relationship is the foundation of learning, not context.</text>

<rect x="40" y="708" width="600" height="50" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="60" y="728" class="th" font-size="12" fill="#412402">Make space for identity (Erikson)</text>
<text x="60" y="746" class="ts" fill="#412402">Students need classrooms where they can safely explore who they are.</text>

<line x1="40" y1="774" x2="640" y2="774" stroke="#D3D1C7" stroke-width="0.5"/>
