  svg { display: block; width: 100%; height: auto; }

    padding: 10px 24px;

  }
  @page { size: letter; margin: 0; }
  @media print {
    body { padding: 0; background: white; }
    .page { box-shadow: none; border-radius: 0; max-width: 100%; }
  }
</style>
</head>
<body>
<div class="page">
<svg viewBox="0 0 680 880" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Week 3: context, morality and identity</title>
<defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2c2c2a; }
    .ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="680" height="56" fill="#E1F5EE"/>
<text x="340" y="24" class="th" text-anchor="middle" font-size="16" fill="#085041">Understanding learners: context, morality &amp; identity</text>
<text x="340" y="44" class="ts" text-anchor="middle" fill="#0F6E56">EDST 1000U — Week 3 reconceptualized</text>

<rect x="40" y="64" width="600" height="46" rx="12" fill="#3C3489"/>
<text x="340" y="84" class="th" text-anchor="middle" font-size="12" fill="#EEEDFE">A student is never just a student.</text>
<text x="340" y="100" class="ts" text-anchor="middle" fill="#CECBF6">They are shaped by systems, instincts, and an identity still forming.</text>

<line x1="340" y1="110" x2="340" y2="126" stroke="#AFA9EC" stroke-width="1" marker-end="url(#arrow)"/>
<text x="340" y="142" class="th" text-anchor="middle" font-size="12" fill="#3C3489">Three lenses on the same student</text>

<rect x="40" y="152" width="192" height="86" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="136" y="168" class="th" text-anchor="middle" font-size="12" fill="#26215C">Bronfenbrenner</text>
<text x="136" y="182" class="ts" text-anchor="middle" fill="#534AB7">The context</text>
<line x1="56" y1="188" x2="216" y2="188" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="136" y="204" class="ts" text-anchor="middle" fill="#26215C">Family and culture</text>
<text x="136" y="218" class="ts" text-anchor="middle" fill="#26215C">shape the learner</text>
<text x="136" y="232" class="ts" text-anchor="middle" fill="#534AB7">before they arrive.</text>

<rect x="244" y="152" width="192" height="86" rx="10" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
<text x="340" y="168" class="th" text-anchor="middle" font-size="12" fill="#4B1528">Haidt + Gilligan</text>
<text x="340" y="182" class="ts" text-anchor="middle" fill="#993556">The moral instincts</text>
<line x1="260" y1="188" x2="420" y2="188" stroke="#ED93B1" stroke-width="0.5"/>
<text x="340" y="204" class="ts" text-anchor="middle" fill="#4B1528">Gut reactions come</text>
<text x="340" y="218" class="ts" text-anchor="middle" fill="#4B1528">before reasoning.</text>
<text x="340" y="232" class="ts" text-anchor="middle" fill="#993556">Care drives choices.</text>

<rect x="448" y="152" width="192" height="86" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="544" y="168" class="th" text-anchor="middle" font-size="12" fill="#412402">Erikson</text>
<text x="544" y="182" class="ts" text-anchor="middle" fill="#854F0B">The identity</text>
<line x1="464" y1="188" x2="624" y2="188" stroke="#EF9F27" stroke-width="0.5"/>
<text x="544" y="204" class="ts" text-anchor="middle" fill="#412402">Students are still</text>
<text x="544" y="218" class="ts" text-anchor="middle" fill="#412402">figuring out who</text>
<text x="544" y="232" class="ts" text-anchor="middle" fill="#854F0B">they are to others.</text>

<line x1="136" y1="238" x2="136" y2="258" stroke="#AFA9EC" stroke-width="1"/>
<line x1="340" y1="238" x2="340" y2="258" stroke="#ED93B1" stroke-width="1"/>
<line x1="544" y1="238" x2="544" y2="258" stroke="#EF9F27" stroke-width="1"/>
<line x1="136" y1="258" x2="544" y2="258" stroke="#888780" stroke-width="0.5"/>
<line x1="340" y1="258" x2="340" y2="274" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="100" y="276" width="480" height="34" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="290" class="th" text-anchor="middle" font-size="12" fill="#2C2C2A">Together: classroom behavior reflects</text>
<text x="340" y="304" class="ts" text-anchor="middle" fill="#5F5E5A">upbringing, instincts, and an identity in progress.</text>

<line x1="40" y1="320" x2="640" y2="320" stroke="#D3D1C7" stroke-width="0.5"/>

<text x="340" y="338" class="th" text-anchor="middle" font-size="12" fill="#3C3489">Why Kohlberg's stages alone fall short</text>

<rect x="40" y="348" width="290" height="86" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="60" y="366" class="th" font-size="12" fill="#0C447C">Kohlberg assumed:</text>
<text x="60" y="382" class="ts" fill="#042C53">Moral growth = linear stages</text>
<text x="60" y="396" class="ts" fill="#042C53">Reasoning before reaction</text>
<text x="60" y="410" class="ts" fill="#042C53">Universal for all people</text>
<text x="60" y="424" class="ts" fill="#185FA5">Based on male subjects only</text>

<rect x="350" y="348" width="290" height="86" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="370" y="366" class="th" font-size="12" fill="#712B13">But research shows:</text>
<text x="370" y="382" class="ts" fill="#4A1B0C">Haidt: intuition fires first</text>
<text x="370" y="396" class="ts" fill="#4A1B0C">Gilligan: care matters too</text>
<text x="370" y="410" class="ts" fill="#4A1B0C">Culture shapes moral views</text>
<text x="370" y="424" class="ts" fill="#993C1D">His model had blind spots</text>

<line x1="330" y1="396" x2="350" y2="396" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<line x1="40" y1="444" x2="640" y2="444" stroke="#D3D1C7" stroke-width="0.5"/>

<text x="340" y="462" class="th" text-anchor="middle" font-size="12" fill="#085041">What this means for teaching</text>

<rect x="40" y="476" width="600" height="42" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="60" y="494" class="th" font-size="12" fill="#04342C">Know the whole student (Bronfenbrenner)</text>
<text x="60" y="510" class="ts" fill="#085041">Don't just address struggles in class. Ask what's happening outside it.</text>

<rect x="40" y="524" width="600" height="42" rx="8" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
<text x="60" y="542" class="th" font-size="12" fill="#4B1528">Build the relationship first (Gilligan + Haidt)</text>
<text x="60" y="558" class="ts" fill="#4B1528">The teacher-student relationship is the foundation of learning, not context.</text>

<rect x="40" y="572" width="600" height="42" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="60" y="590" class="th" font-size="12" fill="#412402">Make space for identity (Erikson)</text>
<text x="60" y="606" class="ts" fill="#412402">Students need classrooms where they can safely explore who they are.</text>

<line x1="40" y1="624" x2="640" y2="624" stroke="#D3D1C7" stroke-width="0.5"/>

<text x="340" y="642" class="th" text-anchor="middle" font-size="12" fill="#3C3489">Bronfenbrenner's ecological model</text>

<rect x="40" y="652" width="600" height="150" rx="16" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="340" y="668" class="th" text-anchor="middle" font-size="12" fill="#26215C">Macrosystem</text>
<text x="340" y="680" class="ts" text-anchor="middle" fill="#3C3489">Culture, laws, values</text>

<rect x="80" y="688" width="520" height="106" rx="14" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text x="340" y="704" class="th" text-anchor="middle" font-size="12" fill="#26215C">Exosystem</text>
<text x="340" y="716" class="ts" text-anchor="middle" fill="#3C3489">Workplace, media, services</text>

<rect x="160" y="724" width="360" height="62" rx="12" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="740" class="th" text-anchor="middle" font-size="12" fill="#26215C">Mesosystem</text>
<text x="340" y="754" class="ts" text-anchor="middle" fill="#26215C">Links between settings</text>

<rect x="240" y="762" width="200" height="18" rx="9" fill="#7F77DD" stroke="#3C3489" stroke-width="0.5"/>
<text x="340" y="775" class="th" text-anchor="middle" font-size="11" fill="#EEEDFE">Microsystem: family, peers, school</text>

<rect x="40" y="816" width="600" height="46" rx="12" fill="#3C3489"/>
<text x="340" y="834" class="th" text-anchor="middle" font-size="13" fill="#EEEDFE">The teacher's responsibility</text>
<text x="340" y="852" class="ts" text-anchor="middle" fill="#CECBF6">See the whole person — their world, instincts, and identity in progress.</text>
</svg>
<div class="bar">EDST 1000U · Week 3 · Self, Social &amp; Moral Development</div>
</div>
</body>
</html>
